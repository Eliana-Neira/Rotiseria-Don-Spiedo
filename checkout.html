<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Pedido - Don Spiedo</title>
    <meta name="description" content="Completá tu pedido en Don Spiedo">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/checkout.css">
</head>
<body>
    <div class="checkoutContainer">
        <div class="checkoutHeader">
            <h1>Finalizar Pedido</h1>
            <p>Completá tus datos para confirmar el pedido</p>
        </div>
        
        <div class="resumenPedido" id="resumenPedido">
            <h3>Resumen del pedido</h3>
            <div id="itemsResumen"></div>
            <div class="itemResumen totalResumen">
                <span>Total:</span>
                <span id="totalResumen">$0</span>
            </div>
        </div>
        
        <form class="formularioCheckout" id="formularioCheckout">
            <div class="filaDoble">
                <div class="campoFormulario">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="campoFormulario">
                    <label for="apellido">Apellido *</label>
                    <input type="text" id="apellido" name="apellido" required>
                </div>
            </div>
            
            <div class="campoFormulario">
                <label for="telefono">Teléfono *</label>
                <input type="tel" id="telefono" name="telefono" required>
            </div>
            
            <!-- Opción de retiro/delivery -->
            <div class="seccionRetiro">
                <label>Tipo de pedido *</label>
                <div class="opcionesRetiro">
                    <label class="opcionRetiro">
                        <input type="radio" name="tipoPedido" value="delivery" checked>
                        <span class="textoRetiro">Delivery</span>
                    </label>
                    <label class="opcionRetiro">
                        <input type="radio" name="tipoPedido" value="retiro">
                        <span class="textoRetiro">Retirar en el local</span>
                    </label>
                </div>
            </div>
            
            <!-- Información de entrega/dirección -->
            <div id="seccionDireccion">
                <div class="filaDoble">
                    <div class="campoFormulario">
                        <label for="calle">Calle *</label>
                        <input type="text" id="calle" name="calle" required>
                    </div>
                    <div class="campoFormulario">
                        <label for="numero">Número *</label>
                        <input type="text" id="numero" name="numero" required>
                    </div>
                </div>
                <div class="campoFormulario">
                    <label for="descripcion">Descripción (opcional)</label>
                    <input type="text" id="descripcion" name="descripcion">
                </div>
            </div>
            
            <!-- Información del local (oculta por defecto) -->
            <div id="infoLocal" class="infoLocal" style="display: none;">
                <h4>Dirección del local</h4>
                <p class="direccionLocal">Av. España 1234, Funes, Santa Fe</p>
                <div class="mapaLocal">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3347.9!2d-60.2500!3d-32.9500!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95b6025777777777%3A0x7777777777777777!2sDon%20Spiedo!5e0!3m2!1ses!2sar!4v1700000000000" 
                        width="100%" 
                        height="150" 
                        style="border:0; border-radius: 10px;" 
                        allowfullscreen="" 
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
            
            <div class="seccionPago">
                <label>Método de pago *</label>
                <div class="campoPago">
                    <label>
                        <input type="radio" name="metodoPago" value="transferencia" required>
                        Transferencia
                    </label>
                    <label>
                        <input type="radio" name="metodoPago" value="efectivo">
                        Efectivo
                    </label>
                </div>
            </div>
            
            <!-- Información de transferencia (oculta por defecto) -->
            <div id="infoTransferencia" class="infoTransferencia" style="display: none;">
                <h4>Datos para transferencia</h4>
                <div class="datosTransferencia">
                    <p><strong>Alias:</strong> <span class="aliasTransferencia">donspiedo.mp</span></p>
                    <p><strong>CVU:</strong> <span class="cvuTransferencia">0000000000000000000000</span></p>
                </div>
            </div>
            
            <div class="campoFormulario" id="campoPagaCon" style="display: none;">
                <label for="pagaCon">¿Con cuánto paga? *</label>
                <div class="inputConMoneda">
                    <span class="simboloMoneda">$</span>
                    <input type="text" id="pagaCon" name="pagaCon" placeholder="0" inputmode="numeric" pattern="[0-9,]*">
                </div>
            </div>
            
            <button type="submit" class="botonEnviar">Enviar pedido por WhatsApp</button>
            <button type="button" class="botonVolver" id="botonVolver">Volver al menú</button>
        </form>
    </div>
    
    <script src="../assets/js/carrito.js"></script>
    <script src="../assets/js/menu.js"></script>
    <script src="../assets/js/checkout.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
